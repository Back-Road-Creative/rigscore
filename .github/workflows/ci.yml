name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18.17', '20', '22']
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      # Lockfile drift guard: `npm ci` must not mutate package-lock.json.
      # If it does, someone edited package.json without regenerating the
      # lockfile — fail loudly so `npm ci` reproducibility holds.
      - name: Lockfile drift check
        run: git diff --exit-code package-lock.json

      - name: Run tests
        run: npm test

      # docs-first gate: verify every src/checks/*.js has a complete doc page at
      # docs/checks/<id>.md. Blocking — adding or modifying a check without
      # updating its docs fails CI. Use `npm run verify:docs -- --stub <id>` to
      # scaffold a new doc from docs/checks/_template.md.
      - name: Verify check docs
        run: npm run verify:docs

      # Dogfood: self-scan rigscore against its own repo with the committed
      # .rigscorerc.json (disables workspace-oriented checks that don't apply
      # to an npm package). Backlog 3.1 fix prevents weight-0 advisory checks
      # from diluting coverage scaling, but CI still runs against a bare npm
      # package so 13/20 checks legitimately N/A — coverage ratio keeps the
      # CI self-score at ~19/100 vs dev-local 35. Threshold 15 = CI baseline
      # (19) minus a 4-point regression buffer. Raising this threshold needs
      # a richer CI fixture or a profile that exempts N/A infra checks.
      - name: Self-scan
        run: node bin/rigscore.js --no-cta --profile default --fail-under 15 .
