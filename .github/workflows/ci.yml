name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18.17', '20', '22']
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      # Lockfile drift guard: `npm ci` must not mutate package-lock.json.
      # If it does, someone edited package.json without regenerating the
      # lockfile — fail loudly so `npm ci` reproducibility holds.
      - name: Lockfile drift check
        run: git diff --exit-code package-lock.json

      - name: Run tests
        run: npm test -- --coverage

      # docs-first gate: verify every src/checks/*.js has a complete doc page at
      # docs/checks/<id>.md. Blocking — adding or modifying a check without
      # updating its docs fails CI. Use `npm run verify:docs -- --stub <id>` to
      # scaffold a new doc from docs/checks/_template.md.
      - name: Verify check docs
        run: npm run verify:docs

      # Dogfood: self-scan rigscore against its own repo with the committed
      # .rigscorerc.json (disables workspace-oriented checks that don't apply
      # to an npm package). rigscore is a bare npm package, so only 10 of 28
      # checks are applicable (weight 46/100) and the coverage ratio scales the
      # score down — that is intended behavior, not a defect.
      #
      # Measured baseline on a pristine clone with a neutralised $HOME (what a
      # runner sees): 37/100. Threshold 30 = baseline (37) minus a 7-point
      # regression buffer. Reproduce locally with:
      #   HOME=$(mktemp -d) node bin/rigscore.js --no-cta --profile default .
      #
      # Raising this threshold needs a richer CI fixture or a profile that
      # exempts the N/A infra checks. Re-measure before changing it.
      - name: Self-scan
        run: node bin/rigscore.js --no-cta --profile default --fail-under 30 .

  # Secret scanning — the ENFORCED gate.
  #
  # .husky/pre-commit is only an optional local pre-check: it no-ops when
  # gitleaks isn't installed (and it usually isn't), so it cannot be relied on.
  # This job is what actually blocks a secret from landing, for every
  # contributor, with no local setup.
  #
  # We run the OSS gitleaks binary rather than gitleaks/gitleaks-action because
  # the action requires a paid GITLEAKS_LICENSE for organization-owned repos —
  # rigscore lives under the Back-Road-Creative org, which has no such secret,
  # so the action would fail on every run for a licensing reason rather than a
  # security one. The binary is the same scanner, needs no license, and sends
  # nothing to a third party. It is pinned by version *and* SHA256, which is a
  # stronger guarantee than pinning an action to a commit SHA.
  #
  # Fixture/test paths are allowlisted in .gitleaks.toml — rigscore is a secret
  # scanner, so its own test data is full of fake credentials by design.
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: '8.30.1'
          GITLEAKS_SHA256: '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb'
        run: |
          cd "$RUNNER_TEMP"
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar xzf gitleaks.tar.gz gitleaks
          cd "$GITHUB_WORKSPACE"
          "$RUNNER_TEMP/gitleaks" dir . --config=.gitleaks.toml --no-banner --redact -v
