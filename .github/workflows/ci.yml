name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # docs-first gate: verify every src/checks/*.js has a complete doc page at
      # docs/checks/<id>.md. Blocking — adding or modifying a check without
      # updating its docs fails CI. Use `npm run verify:docs -- --stub <id>` to
      # scaffold a new doc from docs/checks/_template.md.
      - name: Verify check docs
        run: npm run verify:docs

      # Dogfood: self-scan rigscore against its own repo with the committed
      # .rigscorerc.json (disables workspace-oriented checks that don't apply
      # to an npm package). The --fail-under value is calibrated to the
      # observed baseline minus a 5-point buffer (current 35/100 in a clean
      # CI environment post-W1 project-scope fix; threshold set to 30). Any
      # drop below 30 signals a regression not caught by the unit tests.
      #
      # Manual mutation test (aspirational, not automated):
      #   1. Edit src/checks/claude-md.js to unconditionally push a
      #      { severity: SEVERITY.CRITICAL, ... } finding.
      #   2. Run `node bin/rigscore.js --no-cta --fail-under 30 .` locally.
      #   3. Expect exit code 1 (a gratuitous CRITICAL in a weight-10 check
      #      zeros that check and drags the overall below 30).
      #   4. Revert the edit before committing.
      - name: Self-scan
        run: node bin/rigscore.js --no-cta --profile default --fail-under 30 .
