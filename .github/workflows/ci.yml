name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # docs-first gate: verify every src/checks/*.js has a complete doc page at
      # docs/checks/<id>.md. Blocking — adding or modifying a check without
      # updating its docs fails CI. Use `npm run verify:docs -- --stub <id>` to
      # scaffold a new doc from docs/checks/_template.md.
      - name: Verify check docs
        run: npm run verify:docs

      # Dogfood: self-scan rigscore against its own repo with the committed
      # .rigscorerc.json (disables workspace-oriented checks that don't apply
      # to an npm package). After the advisory-isolation fix (backlog 3.1),
      # weight-0 advisory checks no longer perturb coverage scaling, so the
      # CI self-score tracks dev-local ~35. Threshold 30 leaves a small
      # regression buffer; a drop below 30 signals a real scoring regression
      # not caught by unit tests.
      - name: Self-scan
        run: node bin/rigscore.js --no-cta --profile default --fail-under 30 .
