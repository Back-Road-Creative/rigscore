name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # docs-first gate: verify every src/checks/*.js has a complete doc page at
      # docs/checks/<id>.md. Blocking — adding or modifying a check without
      # updating its docs fails CI. Use `npm run verify:docs -- --stub <id>` to
      # scaffold a new doc from docs/checks/_template.md.
      - name: Verify check docs
        run: npm run verify:docs

      # Dogfood: self-scan rigscore against its own repo with the committed
      # .rigscorerc.json (disables workspace-oriented checks that don't apply
      # to an npm package). The --fail-under value is calibrated to the CI
      # runner's baseline (19/100 as of v0.9.0 + docs-first gate; dev-local
      # runs typically score 35/100 due to extra governance files the runner
      # doesn't pick up). Threshold set to 15 with a 4-point regression
      # buffer. Drops below 15 signal a regression not caught by unit tests.
      # Follow-up: investigate why adding a weight-0 advisory check shifts
      # the coverage calc and lowers CI baseline vs dev-local.
      - name: Self-scan
        run: node bin/rigscore.js --no-cta --profile default --fail-under 15 .
