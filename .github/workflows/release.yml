name: Release

# Triggered by a package.json version bump on main.
# Single workflow — no cross-workflow event chain, no GITHUB_TOKEN trigger gap.
#
# Steps: test → GitHub release → headlessmode post PR
# Distribution: GitHub only (npx github:Back-Road-Creative/rigscore)

on:
  push:
    branches: [main, master]
    paths: ['package.json']
  # rc/beta/alpha tags never reach this workflow: it fires only on a
  # package.json version bump, and rc tags do not bump package.json. rc site
  # posts are therefore hand-authored by design (release-provenance.yml still
  # signs the rc tag; only the headlessmode site post is skipped).
  workflow_dispatch:   # manual re-trigger after tag/release cleanup
    inputs:
      force_site_post:
        description: 'Re-post to the headlessmode site even though the release already exists (e.g. after rotating a dead HEADLESSMODE_PAT). Bypasses the released==true guard so a re-dispatch is not silently skipped.'
        type: boolean
        default: false

jobs:
  release:
    name: Test and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if already released (idempotent)
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.pkg.outputs.version }}" \
               --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.pkg.outputs.version }} already released — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Run tests
        if: steps.check.outputs.exists == 'false'
        run: npm test

      # docs-first gate: same blocking check ci.yml runs. Without it, a
      # release branch could ship a check whose docs/checks/<id>.md is
      # missing or stale — the user-facing `rigscore explain <findingId>`
      # would then break against the just-released artifact.
      - name: Verify check docs
        if: steps.check.outputs.exists == 'false'
        run: npm run verify:docs

      - name: Build changelog
        # Also runs on a forced re-post so the site job still has release notes,
        # even though the release itself already exists.
        if: steps.check.outputs.exists == 'false' || inputs.force_site_post
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --oneline "${PREV_TAG}..HEAD" --no-merges)
          else
            LOG=$(git log --oneline --no-merges | head -20)
          fi
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
            echo "prev_tag=${PREV_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.log }}
        run: |
          printf '%s\n' "$CHANGELOG" > /tmp/release-notes.txt
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "rigscore v${{ steps.pkg.outputs.version }}" \
            --notes-file /tmp/release-notes.txt
          echo "Created release v${{ steps.pkg.outputs.version }}"

      # Attach the machine-readable facts snapshot to the release. This is the
      # authoritative fact set (version, date, check/scored/advisory counts,
      # per-check {id,weight,category,grade}, enforcement-grade split,
      # frameworks, exit codes, CLI flags) every downstream site surface —
      # homepage count/version, JSON-LD softwareVersion, docs check tables — is
      # rendered from. The headlessmode-post job regenerates the same fact set
      # into data/rigscore.json; E4's verify-facts gate compares that file to
      # THIS asset. Generated here, where npm ci already ran.
      - name: Attach facts snapshot to release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          node scripts/generate-facts.js --out rigscore-facts.json
          gh release upload "v${VERSION}" rigscore-facts.json \
            --repo "${{ github.repository }}" --clobber

      # The v<version> tag `gh release create` just made was pushed with the
      # job's GITHUB_TOKEN, and GitHub does NOT re-trigger `push: tags`
      # workflows from a GITHUB_TOKEN-created tag (anti-recursion). So
      # docker-publish.yml and release-provenance.yml never fired on the
      # canonical release path. workflow_dispatch is the exception a
      # GITHUB_TOKEN CAN trigger — dispatch them ON THE TAG (`--ref`) so both
      # build/attest the released tag's tree, not main-at-dispatch. The
      # normalized (`v`-stripped) tag is passed so docker-publish tags the
      # image `<version>` + `latest`, matching the tag-push contract.
      - name: Trigger tag-scoped workflows (docker + provenance)
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          gh workflow run docker-publish.yml --repo "${{ github.repository }}" \
            --ref "v${VERSION}" -f tag="${VERSION}" -f push=true
          gh workflow run release-provenance.yml --repo "${{ github.repository }}" \
            --ref "v${VERSION}"

      # Export changelog + prev-tag for the downstream headlessmode job so
      # it doesn't have to re-checkout this repo.
      - name: Export release outputs
        id: release_out
        if: steps.check.outputs.exists == 'false' || inputs.force_site_post
        # Pass the changelog through env, not raw `${{ }}` interpolation, so a
        # commit/PR title with shell metacharacters cannot execute in the runner
        # (same handling as the "Create GitHub release" step above).
        env:
          CHANGELOG: ${{ steps.changelog.outputs.log }}
        run: |
          {
            echo "version=${{ steps.pkg.outputs.version }}"
            echo "prev_tag=${{ steps.changelog.outputs.prev_tag }}"
            echo "changelog<<EOF"
            printf '%s\n' "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
    outputs:
      released: ${{ steps.check.outputs.exists == 'false' && 'true' || 'false' }}
      version: ${{ steps.release_out.outputs.version }}
      prev_tag: ${{ steps.release_out.outputs.prev_tag }}
      changelog: ${{ steps.release_out.outputs.changelog }}

  # Separate job so the cross-repo PAT (HEADLESSMODE_PAT) is only exposed
  # to the step that needs it, with `contents: read` on this repo —
  # nothing in this job writes to rigscore. Also gated on `released ==
  # 'true'` and on the PAT being set, so a fork without the secret
  # cannot trigger a misleading failure.
  headlessmode-post:
    name: Post release to headlessmode
    needs: release
    # Forced re-post (force_site_post) bypasses the released==true guard so a
    # re-dispatch after a dead PAT is not silently skipped.
    if: needs.release.outputs.released == 'true' || inputs.force_site_post
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write     # "Create issue on failure" step opens a tracking issue
    steps:
      - name: Guard — require HEADLESSMODE_PAT
        env:
          PAT: ${{ secrets.HEADLESSMODE_PAT }}
        run: |
          if [ -z "${PAT}" ]; then
            echo "HEADLESSMODE_PAT not set — skipping cross-repo post."
            echo "skip=true" >> "$GITHUB_ENV"
          fi

      # Fail loudly here, BEFORE the cross-repo clone, if the PAT is set but
      # dead — otherwise the clone dies at `git clone` with an opaque exit 128
      # ("Authentication failed"), which is exactly how the v2.1.0 site post
      # broke unnoticed.
      - name: Preflight — HEADLESSMODE_PAT must be valid
        if: env.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.HEADLESSMODE_PAT }}
        run: |
          if ! login=$(gh api user --jq '.login' 2>/tmp/pat-err); then
            echo "::error::HEADLESSMODE_PAT is set but invalid/expired — 'gh api user' failed. Rotate the PAT; the cross-repo site post cannot run." >&2
            cat /tmp/pat-err >&2
            exit 1
          fi
          echo "HEADLESSMODE_PAT valid — authenticated as ${login}."

      # Check out the product repo on the default branch to run the facts
      # generator. generate-facts.js lives on main (added after the v2.1.0 tag),
      # so a released-tag checkout can't find it; the default branch carries the
      # generator and its check-registry defines the current release, so the
      # emitted facts match the released registry. generate-facts.js loads the
      # check modules, which pull in the two runtime deps (chalk, yaml), so
      # npm ci is required.
      - name: Check out rigscore (default branch — carries the facts generator)
        if: env.skip != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node
        if: env.skip != 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        if: env.skip != 'true'
        run: npm ci

      - name: Generate headlessmode release post + docs page sync
        if: env.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.HEADLESSMODE_PAT }}
          RIGSCORE_CHANGELOG: ${{ needs.release.outputs.changelog }}
          RIGSCORE_PREV_TAG: ${{ needs.release.outputs.prev_tag }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail

          PREV_VERSION="${RIGSCORE_PREV_TAG#v}"

          echo "Version: ${VERSION}"
          echo "Previous: ${PREV_VERSION:-none}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/Back-Road-Creative/headlessmode.git" /tmp/headlessmode
          cd /tmp/headlessmode

          # Regenerate the site's product-facts data file from the live rigscore
          # registry (checked out at the released tag in $GITHUB_WORKSPACE). The
          # site renders its homepage count/version, JSON-LD softwareVersion and
          # docs check tables FROM this file, so hand-patched counts/versions —
          # and the fragile version regex that broke on U+2502 — structurally
          # cease to exist: a release updates one JSON file and everything
          # re-renders. generate-facts.js resolves the registry (and node_modules)
          # from its own checkout dir, so cwd here only decides where --out lands.
          mkdir -p data
          node "${GITHUB_WORKSPACE}/scripts/generate-facts.js" --out data/rigscore.json

          # Write git log to temp file — avoids multiline shell argument issues
          printf '%s\n' "${RIGSCORE_CHANGELOG}" > /tmp/rigscore-git-log.txt

          # Generate release post (content/releases/) — exits non-zero if no
          # conventional commits found
          node scripts/generate-rigscore-post.js \
            --version "${VERSION}" \
            --prev-version "${PREV_VERSION}" \
            --git-log-file "/tmp/rigscore-git-log.txt"

          # Patch content/docs.md release DATE only — the version string now
          # renders from data/rigscore.json (E2 shortcodes), so the version-regex
          # patch is retired; the site script only stamps the date.
          node scripts/patch-rigscore-toolpage.js --version "${VERSION}"

          BRANCH="rigscore-release/v${VERSION}"
          git config user.name "rigscore-bot"
          git config user.email "rigscore-bot@headlessmode.com"
          git checkout -b "${BRANCH}"
          git add content/releases/ content/docs.md data/rigscore.json
          git commit -m "release: rigscore v${VERSION} — facts data + release post + docs date"
          git push origin "${BRANCH}"

          gh pr create \
            --repo Back-Road-Creative/headlessmode \
            --title "release: rigscore v${VERSION}" \
            --body "Auto-generated release post for rigscore v${VERSION}. Includes release post and docs page version bump. Created by rigscore release workflow." \
            --head "${BRANCH}" \
            --base master

      # Mirrors the headlessmode site deploy job's alerting: if any step above
      # failed (dead PAT, patch-script drift, PR-create error), open a tracking
      # issue so a broken site post cannot sit unnoticed the way v2.1.0 did.
      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Release post to headlessmode failed: v${VERSION:-unknown} ($(date +'%Y-%m-%d %H:%M'))" \
            --body "The GitHub release exists but the headlessmode site post / docs sync did not complete, so the live site is stale. Likely causes: expired HEADLESSMODE_PAT or patch-script drift.
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || echo "Could not create issue"
