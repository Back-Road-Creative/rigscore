name: Release

# Triggered by a package.json version bump on main.
# Single workflow — no cross-workflow event chain, no GITHUB_TOKEN trigger gap.
#
# Steps: test → GitHub release → headlessmode post PR
# Distribution: GitHub only (npx github:Back-Road-Creative/rigscore)

on:
  push:
    branches: [main, master]
    paths: ['package.json']
  workflow_dispatch:   # allows manual re-trigger after tag/release cleanup

jobs:
  release:
    name: Test and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if already released (idempotent)
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.pkg.outputs.version }}" \
               --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.pkg.outputs.version }} already released — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Run tests
        if: steps.check.outputs.exists == 'false'
        run: npm test

      # docs-first gate: same blocking check ci.yml runs. Without it, a
      # release branch could ship a check whose docs/checks/<id>.md is
      # missing or stale — the user-facing `rigscore explain <findingId>`
      # would then break against the just-released artifact.
      - name: Verify check docs
        if: steps.check.outputs.exists == 'false'
        run: npm run verify:docs

      - name: Build changelog
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --oneline "${PREV_TAG}..HEAD" --no-merges)
          else
            LOG=$(git log --oneline --no-merges | head -20)
          fi
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
            echo "prev_tag=${PREV_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.log }}
        run: |
          printf '%s\n' "$CHANGELOG" > /tmp/release-notes.txt
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "rigscore v${{ steps.pkg.outputs.version }}" \
            --notes-file /tmp/release-notes.txt
          echo "Created release v${{ steps.pkg.outputs.version }}"

      # The v<version> tag `gh release create` just made was pushed with the
      # job's GITHUB_TOKEN, and GitHub does NOT re-trigger `push: tags` workflows
      # from a GITHUB_TOKEN-created tag (anti-recursion). So docker-publish.yml and
      # release-provenance.yml never fired on release before. workflow_dispatch is
      # the documented exception GITHUB_TOKEN CAN trigger — kick them explicitly.
      - name: Trigger tag-scoped workflows (docker + provenance)
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run docker-publish.yml --repo "${{ github.repository }}" \
            -f tag="v${{ steps.pkg.outputs.version }}" -f push=true
          gh workflow run release-provenance.yml --repo "${{ github.repository }}" \
            --ref "v${{ steps.pkg.outputs.version }}"

      # Export changelog + prev-tag for the downstream headlessmode job so
      # it doesn't have to re-checkout this repo.
      - name: Export release outputs
        id: release_out
        if: steps.check.outputs.exists == 'false'
        run: |
          {
            echo "version=${{ steps.pkg.outputs.version }}"
            echo "prev_tag=${{ steps.changelog.outputs.prev_tag }}"
            echo "changelog<<EOF"
            printf '%s\n' "${{ steps.changelog.outputs.log }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
    outputs:
      released: ${{ steps.check.outputs.exists == 'false' && 'true' || 'false' }}
      version: ${{ steps.release_out.outputs.version }}
      prev_tag: ${{ steps.release_out.outputs.prev_tag }}
      changelog: ${{ steps.release_out.outputs.changelog }}

  # Separate job so the cross-repo PAT (HEADLESSMODE_PAT) is only exposed
  # to the step that needs it, with `contents: read` on this repo —
  # nothing in this job writes to rigscore. Also gated on `released ==
  # 'true'` and on the PAT being set, so a fork without the secret
  # cannot trigger a misleading failure.
  headlessmode-post:
    name: Post release to headlessmode
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Guard — require HEADLESSMODE_PAT
        env:
          PAT: ${{ secrets.HEADLESSMODE_PAT }}
        run: |
          if [ -z "${PAT}" ]; then
            echo "HEADLESSMODE_PAT not set — skipping cross-repo post."
            echo "skip=true" >> "$GITHUB_ENV"
          fi

      - name: Generate headlessmode release post + docs page sync
        if: env.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.HEADLESSMODE_PAT }}
          RIGSCORE_CHANGELOG: ${{ needs.release.outputs.changelog }}
          RIGSCORE_PREV_TAG: ${{ needs.release.outputs.prev_tag }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail

          PREV_VERSION="${RIGSCORE_PREV_TAG#v}"

          echo "Version: ${VERSION}"
          echo "Previous: ${PREV_VERSION:-none}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/Back-Road-Creative/headlessmode.git" /tmp/headlessmode
          cd /tmp/headlessmode

          # Write git log to temp file — avoids multiline shell argument issues
          printf '%s\n' "${RIGSCORE_CHANGELOG}" > /tmp/rigscore-git-log.txt

          # Generate release post (content/releases/) — exits non-zero if no
          # conventional commits found
          node scripts/generate-rigscore-post.js \
            --version "${VERSION}" \
            --prev-version "${PREV_VERSION}" \
            --git-log-file "/tmp/rigscore-git-log.txt"

          # Patch docs page (content/docs.md) version string and date
          node scripts/patch-rigscore-toolpage.js --version "${VERSION}"

          BRANCH="rigscore-release/v${VERSION}"
          git config user.name "rigscore-bot"
          git config user.email "rigscore-bot@headlessmode.com"
          git checkout -b "${BRANCH}"
          git add content/releases/ content/docs.md
          git commit -m "release: rigscore v${VERSION} — release post + docs page sync"
          git push origin "${BRANCH}"

          gh pr create \
            --repo Back-Road-Creative/headlessmode \
            --title "release: rigscore v${VERSION}" \
            --body "Auto-generated release post for rigscore v${VERSION}. Includes release post and docs page version bump. Created by rigscore release workflow." \
            --head "${BRANCH}" \
            --base master
