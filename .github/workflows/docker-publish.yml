# Docker image publish workflow.
#
# Auto-publishes `ghcr.io/back-road-creative/rigscore:<tag>` on `v*.*.*` tag
# pushes. Also callable via `workflow_dispatch` for manual builds / dry-runs.
name: Docker Publish

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v1.0.0, latest, dry-run)'
        required: true
        default: 'dry-run'
      push:
        description: 'Push to GHCR? (false = build only)'
        required: true
        default: 'false'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compute image tags and push flag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            {
              echo "push=true"
              echo "tags<<RIGSCORE_EOF"
              echo "ghcr.io/back-road-creative/rigscore:${VERSION}"
              echo "ghcr.io/back-road-creative/rigscore:latest"
              echo "RIGSCORE_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "push=${{ inputs.push }}"
              echo "tags=ghcr.io/back-road-creative/rigscore:${{ inputs.tag }}"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: steps.meta.outputs.push == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and optionally push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: ${{ steps.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/Back-Road-Creative/rigscore
            org.opencontainers.image.description=AI dev environment hygiene checker
            org.opencontainers.image.licenses=MIT
