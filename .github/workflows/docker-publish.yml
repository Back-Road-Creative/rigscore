# Docker image publish workflow.
#
# Auto-publishes `ghcr.io/back-road-creative/rigscore:<tag>` on `v*.*.*` tag
# pushes. Also callable via `workflow_dispatch` for manual builds / dry-runs.
name: Docker Publish

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v1.0.0, latest, dry-run)'
        required: true
        default: 'dry-run'
      push:
        description: 'Push to GHCR? (false = build only)'
        required: true
        default: 'false'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags and push flag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            # Tag push: strip leading 'v', publish <version> and 'latest'.
            VERSION="${GITHUB_REF_NAME#v}"
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "tags=ghcr.io/back-road-creative/rigscore:${VERSION}
          ghcr.io/back-road-creative/rigscore:latest" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch: honour inputs.push / inputs.tag.
            echo "push=${{ inputs.push }}" >> "$GITHUB_OUTPUT"
            echo "tags=ghcr.io/back-road-creative/rigscore:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.meta.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and optionally push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/Back-Road-Creative/rigscore
            org.opencontainers.image.description=AI dev environment hygiene checker
            org.opencontainers.image.licenses=MIT
