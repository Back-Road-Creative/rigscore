name: Bug report
description: Report a defect in the rigscore scanner or its output
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. For a **security vulnerability**, do NOT open a public
        issue — follow the private disclosure process in
        [SECURITY.md](https://github.com/Back-Road-Creative/rigscore/blob/main/SECURITY.md).
  - type: input
    id: version
    attributes:
      label: rigscore version
      description: Output of `rigscore --version` (or the tag / commit you ran).
      placeholder: "rigscore v2.1.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: The command you ran, what you expected, and what you got instead.
      placeholder: |
        Command:  rigscore --profile ci .
        Expected: ...
        Actual:   ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps or a minimal config that reproduces it. Redact any real secrets.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS and Node version (`node --version`).
      placeholder: "macOS 14 / Node 20.11"
    validations:
      required: true
