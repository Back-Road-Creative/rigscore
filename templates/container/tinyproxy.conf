Port 8888
Listen 0.0.0.0
Timeout 600
PidFile "/tmp/tinyproxy.pid"
# Named volume: tinyproxy REFUSES /dev/stdout under read_only + nobody, silently killing auditing.
LogFile "/var/log/tinyproxy/tinyproxy.log"
LogLevel Connect
MaxClients 100

# Only the internal egress network may use this proxy, pinned to the subnet the compose ipam block
# assigns so this ACL can't drift (all-RFC1918 would admit any container that can route here).
# Loopback admits ONLY this container's own healthcheck.
Allow {{EGRESS_SUBNET}}
Allow 127.0.0.1

# Fail-closed: deny every destination ./allowlist does not explicitly match.
FilterDefaultDeny Yes
Filter "/etc/tinyproxy/allowlist"
FilterType ere
FilterCaseSensitive Off
FilterURLs Off
# CONNECT tunnels only to 443 (HTTPS) and 22 (git-over-SSH). KNOWN RESIDUAL: ConnectPort gates only
# CONNECT, so plain HTTP to an ALLOW-LISTED host can still reach any port. Bounded by the list.
ConnectPort 443
ConnectPort 22
