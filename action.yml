name: 'rigscore'
description: 'AI dev environment hygiene checker — scan and score your configuration security'
author: 'Joe Petrucelli'

# GitHub Marketplace listing metadata. `icon` is a Feather icon from GitHub's
# allowed set; `color` is one of GitHub's eight documented brand colors.
branding:
  icon: 'shield'
  color: 'green'

inputs:
  path:
    description: 'Directory to scan (the scan root)'
    required: false
    default: '.'
  fail-under:
    description: 'Minimum score threshold (exit 1 if below)'
    required: false
    default: '70'
  profile:
    description: 'Scoring profile (default, minimal, ci, home, monorepo)'
    required: false
    default: 'default'
  check:
    description: 'Limit the scan to a single check id (e.g. mcp-config). Empty = all checks.'
    required: false
    default: ''
  recursive:
    description: 'Enable recursive scanning for monorepos'
    required: false
    default: 'false'
  depth:
    description: 'Recursion depth (implies recursive)'
    required: false
    default: '1'
  deep:
    description: 'Enable deep source secret scanning'
    required: false
    default: 'false'
  online:
    description: 'Allow the online MCP-registry refresh (default is fully offline)'
    required: false
    default: 'false'
  ignore:
    description: 'Comma-separated finding ids / patterns to suppress (same as --ignore)'
    required: false
    default: ''
  baseline:
    description: 'Path to a baseline file: gate on findings NEW since the baseline (same as --baseline)'
    required: false
    default: ''
  upload-sarif:
    description: 'Upload SARIF results to GitHub Advanced Security'
    required: false
    default: 'false'

outputs:
  score:
    description: 'Overall hygiene score (0-100). Empty in --recursive mode when there is no single aggregate score.'
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: 'Letter grade derived from the score (A>=90, B>=75, C>=60, D>=40, else F); see src/reporter.js getGrade.'
    value: ${{ steps.scan.outputs.grade }}
  sarif-file:
    description: 'Absolute path to the emitted SARIF file. Produced only when upload-sarif is true.'
    value: ${{ steps.sarif.outputs.sarif-file }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: '20'

    # Validate that the caller pinned to a tag (vX.Y.Z), not a branch.
    # Floating refs like `@main` let any default-branch compromise flow
    # into every consumer — refuse and instruct the caller to pin.
    - name: Validate pinned ref
      shell: bash
      env:
        ACTION_REF: ${{ github.action_ref }}
      run: |
        if [ -z "${ACTION_REF}" ]; then
          echo "::error::github.action_ref is empty. Pin this action to a tag, e.g. Back-Road-Creative/rigscore@v1.0.0." >&2
          exit 1
        fi
        if ! printf '%s' "${ACTION_REF}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$'; then
          echo "::error::github.action_ref='${ACTION_REF}' is not a semver tag. Pin to a tag like @v1.0.0 — branches and floating refs are rejected to prevent supply-chain drift." >&2
          exit 1
        fi

    # Check out the rigscore source at the ref the caller pinned
    # (e.g. Back-Road-Creative/rigscore@v1.0.0 → clones v1.0.0 here).
    # `github.action_ref` resolves to the ref used in the caller's `uses:` line
    # and has been tag-validated in the previous step.
    # actions/checkout forces `path:` under $GITHUB_WORKSPACE, so a true sibling
    # is impossible — this lands in a `.rigscore-action-src` SUBDIRECTORY of the
    # scan root. deep-secrets' SKIP_DIRS excludes that dir from `--deep` scans so
    # rigscore's own source never pollutes the caller's results.
    - name: Check out rigscore source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        repository: Back-Road-Creative/rigscore
        ref: ${{ github.action_ref }}
        path: .rigscore-action-src

    - name: Install rigscore dependencies
      shell: bash
      working-directory: .rigscore-action-src
      run: npm ci --no-audit --no-fund

    # ONE scan. rigscore emits its score in --json and exits non-zero when the
    # score breaches --fail-under; we capture that exit code and REUSE it as the
    # job gate (the "Enforce threshold" step below), instead of running the whole
    # scan a second time just to re-derive an exit code we already had. Inputs are
    # passed through env (not `${{ }}` interpolated into the script) so a value
    # with shell metacharacters cannot execute in the runner.
    - name: Run rigscore
      id: scan
      shell: bash
      env:
        SCAN_PATH: ${{ inputs.path }}
        FAIL_UNDER: ${{ inputs.fail-under }}
        PROFILE: ${{ inputs.profile }}
        CHECK: ${{ inputs.check }}
        RECURSIVE: ${{ inputs.recursive }}
        DEPTH: ${{ inputs.depth }}
        DEEP: ${{ inputs.deep }}
        ONLINE: ${{ inputs.online }}
        IGNORE: ${{ inputs.ignore }}
        BASELINE: ${{ inputs.baseline }}
      run: |
        set -uo pipefail
        ARGS=(--fail-under "$FAIL_UNDER" --profile "$PROFILE")
        [ "$RECURSIVE" = "true" ] && ARGS+=(--recursive --depth "$DEPTH")
        [ "$DEEP" = "true" ] && ARGS+=(--deep)
        [ "$ONLINE" = "true" ] && ARGS+=(--online)
        [ -n "$CHECK" ] && ARGS+=(--check "$CHECK")
        [ -n "$IGNORE" ] && ARGS+=(--ignore "$IGNORE")
        [ -n "$BASELINE" ] && ARGS+=(--baseline "$BASELINE")
        # Persist the arg vector so the optional SARIF emit reuses it verbatim.
        printf '%s\n' "${ARGS[@]}" > "$RUNNER_TEMP/rigscore-args"
        set +e
        node "$GITHUB_WORKSPACE/.rigscore-action-src/bin/rigscore.js" "${ARGS[@]}" --json "$SCAN_PATH" > "$RUNNER_TEMP/rigscore.json"
        code=$?
        set -e
        # Parse the score and derive the grade (thresholds mirror src/reporter.js
        # getGrade). A crash leaves the JSON unparseable → empty score/grade; the
        # captured exit code still gates.
        parsed=$(node -e '
          const fs = require("fs");
          let d = {};
          try { d = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); } catch {}
          const s = typeof d.score === "number" ? d.score : null;
          const g = s === null ? "" : s >= 90 ? "A" : s >= 75 ? "B" : s >= 60 ? "C" : s >= 40 ? "D" : "F";
          process.stdout.write((s === null ? "" : s) + "\t" + g);
        ' "$RUNNER_TEMP/rigscore.json")
        score=${parsed%%$'\t'*}
        grade=${parsed##*$'\t'}
        {
          echo "score=$score"
          echo "grade=$grade"
          echo "exit-code=$code"
        } >> "$GITHUB_OUTPUT"
        if [ "$code" -ge 2 ]; then
          echo "::error::rigscore scan did not complete (exit $code)"
          head -c 2000 "$RUNNER_TEMP/rigscore.json" >&2 || true
        fi
        echo "rigscore: score ${score:-n/a} (grade ${grade:-n/a}), threshold ${FAIL_UNDER}, exit ${code}"

    # SARIF is a distinct artifact (a different output format), emitted only when
    # a consumer actually wants to upload it — so the default path stays a single
    # scan. It reuses the exact arg vector from the scan step above.
    - name: Emit SARIF
      id: sarif
      if: inputs.upload-sarif == 'true'
      shell: bash
      env:
        SCAN_PATH: ${{ inputs.path }}
      run: |
        set -uo pipefail
        mapfile -t ARGS < "$RUNNER_TEMP/rigscore-args"
        SARIF="$GITHUB_WORKSPACE/rigscore-results.sarif"
        node "$GITHUB_WORKSPACE/.rigscore-action-src/bin/rigscore.js" "${ARGS[@]}" --ci "$SCAN_PATH" > "$SARIF" || true
        echo "sarif-file=$SARIF" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF
      if: inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
      with:
        sarif_file: rigscore-results.sarif

    # Gate on the SINGLE scan's exit code — no second full scan.
    - name: Enforce threshold
      shell: bash
      run: |
        code="${{ steps.scan.outputs.exit-code }}"
        exit "${code:-2}"
